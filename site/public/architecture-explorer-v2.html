<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>APEX — Architecture Explorer (v2)</title>
    <meta
      name="description"
      content="Two readable views over the APEX architecture: a Step 1→7 workflow timeline and a searchable agent card grid. Built from the same graph JSON as the 3D explorer."
    />
    <link rel="icon" type="image/svg+xml" href="/azure-agentic-infraops/images/favicon.svg" />
    <style>
      :root {
        --bg: #0d1117;
        --bg-2: #161b22;
        --panel: #1c2128;
        --panel-2: #21262d;
        --border: #30363d;
        --border-strong: #484f58;
        --text: #f0f6fc;
        --text-dim: #c9d1d9;
        --text-faint: #8b949e;
        --accent: #0078d4;
        --accent-strong: #4cc2ff;
        --accent-glow: rgba(76, 194, 255, 0.25);
        --focus: #f0883e;

        /* Category palette — keep aligned with the v1 explorer + sidebar */
        --cat-agent: #4cc2ff;
        --cat-subagent: #818cf8;
        --cat-skill: #34d399;
        --cat-instruction: #fbbf24;
        --cat-prompt: #f472b6;
        --cat-validator: #a78bfa;
        --cat-workflow: #22d3ee;
        --cat-mcp: #fb7185;

        /* Model palette */
        --model-claude: #d97706;
        --model-gpt: #10a37f;
        --model-other: #6b7280;
      }
      @media (prefers-color-scheme: light) {
        :root {
          --bg: #ffffff;
          --bg-2: #f6f8fa;
          --panel: #ffffff;
          --panel-2: #f6f8fa;
          --border: #d0d7de;
          --border-strong: #afb8c1;
          --text: #1f2328;
          --text-dim: #424a53;
          --text-faint: #6e7781;
        }
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
        line-height: 1.5;
      }
      a { color: var(--accent-strong); text-decoration: none; }
      a:hover { text-decoration: underline; }
      button { font-family: inherit; cursor: pointer; }

      /* ---------- Top bar ---------- */
      #topbar {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 12px 20px;
        background: var(--bg-2);
        border-bottom: 1px solid var(--border);
        position: sticky;
        top: 0;
        z-index: 30;
        flex-wrap: wrap;
      }
      #brand { font-weight: 700; font-size: 15px; letter-spacing: 0.5px; }
      #brand .accent { color: var(--accent-strong); }
      .view-toggle {
        display: inline-flex;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 2px;
      }
      .view-toggle button {
        background: transparent;
        border: 0;
        color: var(--text-dim);
        padding: 6px 14px;
        font-size: 13px;
        font-weight: 600;
        border-radius: 6px;
        transition: all 0.15s;
      }
      .view-toggle button.active {
        background: var(--accent);
        color: #fff;
      }
      .view-toggle button:not(.active):hover { color: var(--text); background: var(--panel-2); }
      #search-box {
        flex: 1;
        min-width: 220px;
        background: var(--panel);
        border: 1px solid var(--border);
        color: var(--text);
        padding: 8px 12px;
        border-radius: 6px;
        font-size: 13px;
      }
      #search-box:focus { outline: 2px solid var(--accent); outline-offset: -1px; border-color: var(--accent); }
      .topbar-meta { color: var(--text-faint); font-size: 12px; }

      /* ---------- View containers ---------- */
      main { padding: 28px 24px 80px; max-width: 1400px; margin: 0 auto; }
      .view { display: none; }
      .view.active { display: block; }

      /* ---------- Timeline view ---------- */
      .timeline {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 14px;
        margin-bottom: 32px;
      }
      .step {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 14px;
        position: relative;
        transition: all 0.15s;
        cursor: pointer;
      }
      .step:hover {
        border-color: var(--accent);
        transform: translateY(-2px);
        box-shadow: 0 4px 12px var(--accent-glow);
      }
      .step.fork { background: linear-gradient(135deg, var(--panel), var(--panel-2)); }
      .step-num {
        display: inline-block;
        background: var(--accent);
        color: #fff;
        font-weight: 700;
        font-size: 11px;
        padding: 2px 8px;
        border-radius: 4px;
        margin-bottom: 8px;
      }
      .step-num.optional { background: var(--text-faint); }
      .step h3 {
        font-size: 14px;
        margin-bottom: 4px;
        color: var(--text);
        font-weight: 600;
      }
      .step .agent-name { font-family: "JetBrains Mono", "Fira Code", monospace; font-size: 12px; color: var(--accent-strong); }
      .step .step-desc { font-size: 12px; color: var(--text-dim); margin: 8px 0; line-height: 1.45; }
      .step .step-meta { display: flex; flex-wrap: wrap; gap: 4px; font-size: 11px; color: var(--text-faint); }
      .gate {
        background: rgba(240, 136, 62, 0.08);
        border: 1px dashed var(--focus);
        color: var(--focus);
        font-size: 11px;
        font-weight: 600;
        padding: 8px 10px;
        border-radius: 8px;
        text-align: center;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .section-h {
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--text-faint);
        margin: 24px 0 12px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .section-h::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--border);
      }

      /* Chip styles shared across views */
      .chips { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
      .chip {
        font-size: 10px;
        font-weight: 600;
        padding: 2px 7px;
        border-radius: 10px;
        background: var(--panel-2);
        border: 1px solid var(--border);
        color: var(--text-dim);
        white-space: nowrap;
      }
      .chip.skill { border-color: rgba(52, 211, 153, 0.4); color: var(--cat-skill); }
      .chip.subagent { border-color: rgba(129, 140, 248, 0.4); color: var(--cat-subagent); }
      .chip.model.claude { border-color: rgba(217, 119, 6, 0.45); color: var(--model-claude); }
      .chip.model.gpt { border-color: rgba(16, 163, 127, 0.45); color: var(--model-gpt); }
      .chip.model.other { border-color: var(--border); color: var(--text-faint); }
      .chip.category { font-weight: 700; }

      /* ---------- Grid view ---------- */
      .grid-filters {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 18px;
        align-items: center;
      }
      .filter-chip {
        font-size: 12px;
        font-weight: 600;
        padding: 5px 12px;
        border-radius: 20px;
        background: var(--panel);
        border: 1px solid var(--border);
        color: var(--text-dim);
        cursor: pointer;
        user-select: none;
        transition: all 0.15s;
      }
      .filter-chip.active {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }
      .filter-chip:not(.active):hover { color: var(--text); border-color: var(--border-strong); }
      .grid-count { font-size: 12px; color: var(--text-faint); margin-left: auto; }

      .card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 14px;
      }
      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 16px;
        transition: all 0.15s;
        cursor: pointer;
        display: flex;
        flex-direction: column;
      }
      .card:hover {
        border-color: var(--accent);
        transform: translateY(-2px);
        box-shadow: 0 4px 12px var(--accent-glow);
      }
      .card-head {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 8px;
        margin-bottom: 8px;
      }
      .card h4 {
        font-size: 14px;
        font-weight: 600;
        font-family: "JetBrains Mono", "Fira Code", monospace;
        color: var(--text);
        word-break: break-word;
      }
      .card-cat-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
        margin-top: 6px;
      }
      .card .card-desc {
        font-size: 12px;
        color: var(--text-dim);
        line-height: 1.5;
        margin-bottom: 10px;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .card-foot { margin-top: auto; }

      /* ---------- Detail drawer ---------- */
      .drawer-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
        z-index: 60;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s;
      }
      .drawer-backdrop.open { opacity: 1; pointer-events: auto; }
      .drawer {
        position: fixed;
        right: 0;
        top: 0;
        bottom: 0;
        width: min(480px, 100vw);
        background: var(--bg-2);
        border-left: 1px solid var(--border);
        padding: 24px;
        overflow-y: auto;
        z-index: 61;
        transform: translateX(100%);
        transition: transform 0.25s ease-out;
      }
      .drawer.open { transform: translateX(0); }
      .drawer-head {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
        margin-bottom: 12px;
      }
      .drawer h2 {
        font-size: 18px;
        font-weight: 700;
        font-family: "JetBrains Mono", "Fira Code", monospace;
      }
      .drawer-close {
        background: var(--panel);
        border: 1px solid var(--border);
        color: var(--text-dim);
        padding: 4px 10px;
        border-radius: 6px;
        font-size: 18px;
        line-height: 1;
      }
      .drawer-close:hover { color: var(--text); }
      .drawer h5 {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 1px;
        font-weight: 700;
        color: var(--text-faint);
        margin: 18px 0 8px;
      }
      .drawer .desc { font-size: 13px; color: var(--text-dim); line-height: 1.6; }
      .drawer ul { list-style: none; }
      .drawer li {
        padding: 6px 10px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 6px;
        margin-bottom: 4px;
        font-size: 12px;
        color: var(--text-dim);
        font-family: "JetBrains Mono", "Fira Code", monospace;
      }
      .drawer .source-link {
        display: inline-block;
        margin-top: 12px;
        background: var(--accent);
        color: #fff;
        padding: 6px 14px;
        border-radius: 6px;
        font-size: 12px;
        font-weight: 600;
      }
      .drawer .source-link:hover { background: var(--accent-strong); text-decoration: none; }

      /* ---------- Empty state ---------- */
      .empty {
        text-align: center;
        padding: 60px 20px;
        color: var(--text-faint);
        font-size: 14px;
      }

      /* ---------- Responsive ---------- */
      @media (max-width: 640px) {
        main { padding: 16px 12px 60px; }
        #topbar { padding: 10px 12px; }
        .timeline { grid-template-columns: 1fr; }
        .card-grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>

  <body>
    <header id="topbar">
      <div id="brand"><span class="accent">APEX</span> · Architecture Explorer</div>
      <div class="view-toggle" role="tablist" aria-label="View selector">
        <button id="btn-timeline" class="active" role="tab" aria-selected="true" data-view="timeline">Workflow Timeline</button>
        <button id="btn-grid" role="tab" aria-selected="false" data-view="grid">Agent Grid</button>
      </div>
      <input
        id="search-box"
        type="search"
        placeholder="Search agents, skills, subagents…"
        aria-label="Search the architecture"
      />
      <span class="topbar-meta" id="topbar-meta"></span>
    </header>

    <main>
      <!-- ===================== Timeline view ===================== -->
      <section class="view active" id="view-timeline" aria-labelledby="btn-timeline">
        <div class="section-h">Core workflow · Steps 1 → 7</div>
        <div class="timeline" id="timeline-core"></div>

        <div class="section-h">Side agents · Diagnostics, reviews, optimisation</div>
        <div class="timeline" id="timeline-side"></div>
      </section>

      <!-- ===================== Grid view ===================== -->
      <section class="view" id="view-grid" aria-labelledby="btn-grid">
        <div class="grid-filters" id="grid-filters">
          <!-- filter chips injected -->
          <span class="grid-count" id="grid-count"></span>
        </div>
        <div class="card-grid" id="card-grid"></div>
      </section>
    </main>

    <!-- ===================== Detail drawer ===================== -->
    <div class="drawer-backdrop" id="drawer-backdrop"></div>
    <aside class="drawer" id="drawer" aria-hidden="true">
      <div class="drawer-head">
        <h2 id="drawer-title">—</h2>
        <button class="drawer-close" id="drawer-close" aria-label="Close">×</button>
      </div>
      <div id="drawer-body"></div>
    </aside>

    <script>
      const GRAPH_URL = "/azure-agentic-infraops/architecture-explorer-graph.json";

      // ---- Workflow step mapping (canonical, mirrors workflow-graph.json) ----
      // Step number → { agent label, gate after?, optional?, fork? }
      const STEP_MAP = [
        { step: "1", label: "Requirements", agent: "02-Requirements", gateAfter: "Gate 1 · Approval" },
        { step: "2", label: "Architecture", agent: "03-Architect", gateAfter: "Gate 2 · Approval" },
        { step: "3", label: "Design (opt)", agent: "04-Design", optional: true },
        { step: "3.5", label: "Governance", agent: "04g-Governance", gateAfter: "Gate 2.5 · Approval" },
        { step: "4", label: "IaC Plan", agent: "05-IaC Planner", gateAfter: "Gate 3 · Approval" },
        { step: "5b", label: "Bicep Code", agent: "06b-Bicep CodeGen", fork: "bicep" },
        { step: "5t", label: "Terraform Code", agent: "06t-Terraform CodeGen", fork: "terraform", gateAfter: "Gate 4 · Validation" },
        { step: "6b", label: "Bicep Deploy", agent: "07b-Bicep Deploy", fork: "bicep" },
        { step: "6t", label: "Terraform Deploy", agent: "07t-Terraform Deploy", fork: "terraform", gateAfter: "Gate 5 · Approval" },
        { step: "7", label: "As-Built", agent: "08-As-Built" },
      ];

      const SIDE_AGENTS = ["01-Orchestrator", "09-Diagnose", "10-Challenger", "11-Context Optimizer", "E2E Orchestrator"];

      // ---- State ----
      let graph = null;
      let nodes = [];
      let edgesBySource = new Map();
      let edgesByTarget = new Map();
      let currentView = "timeline";
      let activeFilters = new Set(["agent", "subagent"]);
      let searchQuery = "";

      // ---- Helpers ----
      const $ = (id) => document.getElementById(id);
      const byLabel = (label) => nodes.find((n) => n.label === label);

      function modelClass(model) {
        if (!model) return "other";
        const m = model.toLowerCase();
        if (m.includes("claude")) return "claude";
        if (m.includes("gpt") || m.includes("o4") || m.includes("o1")) return "gpt";
        return "other";
      }

      function escape(s) {
        if (s == null) return "";
        return String(s).replace(/[&<>"']/g, (c) => ({
          "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
        }[c]));
      }

      function firstSentence(text) {
        if (!text) return "";
        const t = text.replace(/^\*\*[^*]+\*\*\s*—\s*/, "");
        const m = t.match(/^[^.]+\./);
        return m ? m[0] : t.slice(0, 160);
      }

      function relatedSkills(node) {
        const skills = (node.meta && node.meta.skills) || [];
        return skills.slice(0, 6);
      }

      // ---- Renderers ----
      function renderTimeline() {
        const core = $("timeline-core");
        const side = $("timeline-side");
        core.innerHTML = "";
        side.innerHTML = "";

        STEP_MAP.forEach((step) => {
          const node = byLabel(step.agent);
          if (!node) return;
          core.appendChild(makeStepCard(step, node));
          if (step.gateAfter) {
            const g = document.createElement("div");
            g.className = "gate";
            g.textContent = step.gateAfter;
            core.appendChild(g);
          }
        });

        SIDE_AGENTS.forEach((label) => {
          const node = byLabel(label);
          if (!node) return;
          side.appendChild(makeSideCard(node));
        });
      }

      function makeStepCard(step, node) {
        const card = document.createElement("div");
        card.className = "step" + (step.fork ? " fork" : "");
        card.dataset.nodeId = node.id;
        const skills = relatedSkills(node);
        const mc = modelClass(node.meta && node.meta.model);
        card.innerHTML = `
          <span class="step-num${step.optional ? " optional" : ""}">Step ${escape(step.step)}${step.optional ? " · optional" : ""}</span>
          <h3>${escape(step.label)}</h3>
          <div class="agent-name">${escape(node.label)}</div>
          <div class="step-desc">${escape(firstSentence(node.description))}</div>
          <div class="chips">
            ${node.meta && node.meta.model ? `<span class="chip model ${mc}">${escape(node.meta.model)}</span>` : ""}
            ${skills.map((s) => `<span class="chip skill">${escape(s)}</span>`).join("")}
          </div>
        `;
        card.addEventListener("click", () => openDrawer(node));
        return card;
      }

      function makeSideCard(node) {
        const card = document.createElement("div");
        card.className = "step";
        card.dataset.nodeId = node.id;
        const skills = relatedSkills(node);
        const mc = modelClass(node.meta && node.meta.model);
        card.innerHTML = `
          <span class="step-num optional">${escape(node.label)}</span>
          <div class="step-desc">${escape(firstSentence(node.description))}</div>
          <div class="chips">
            ${node.meta && node.meta.model ? `<span class="chip model ${mc}">${escape(node.meta.model)}</span>` : ""}
            ${skills.map((s) => `<span class="chip skill">${escape(s)}</span>`).join("")}
          </div>
        `;
        card.addEventListener("click", () => openDrawer(node));
        return card;
      }

      function renderFilters() {
        const wrap = $("grid-filters");
        const categories = [...new Set(nodes.map((n) => n.category))];
        const order = ["agent", "subagent", "skill", "instruction", "validator", "workflow", "mcp", "prompt"];
        const ordered = order.filter((c) => categories.includes(c)).concat(categories.filter((c) => !order.includes(c)));

        // Clear (preserve count span)
        const count = $("grid-count");
        wrap.innerHTML = "";
        ordered.forEach((cat) => {
          const btn = document.createElement("button");
          btn.className = "filter-chip" + (activeFilters.has(cat) ? " active" : "");
          btn.dataset.cat = cat;
          btn.textContent = cat;
          btn.addEventListener("click", () => {
            if (activeFilters.has(cat)) activeFilters.delete(cat);
            else activeFilters.add(cat);
            btn.classList.toggle("active");
            renderGrid();
          });
          wrap.appendChild(btn);
        });
        wrap.appendChild(count);
      }

      function renderGrid() {
        const wrap = $("card-grid");
        wrap.innerHTML = "";
        const q = searchQuery.toLowerCase();
        const matches = nodes.filter((n) => {
          if (!activeFilters.has(n.category)) return false;
          if (!q) return true;
          const hay =
            (n.label || "") + " " + (n.description || "") + " " + (n.path || "") + " " + JSON.stringify(n.meta || {});
          return hay.toLowerCase().includes(q);
        });
        matches.sort((a, b) => a.label.localeCompare(b.label));
        $("grid-count").textContent = `${matches.length} of ${nodes.length}`;

        if (matches.length === 0) {
          wrap.innerHTML = `<div class="empty">No matches. Adjust filters or clear the search.</div>`;
          return;
        }

        matches.forEach((node) => {
          const card = document.createElement("div");
          card.className = "card";
          card.dataset.nodeId = node.id;
          const mc = modelClass(node.meta && node.meta.model);
          const skills = relatedSkills(node);
          card.innerHTML = `
            <div class="card-head">
              <h4>${escape(node.label)}</h4>
              <span class="card-cat-dot" style="background: var(--cat-${node.category})"></span>
            </div>
            <div class="card-desc">${escape(firstSentence(node.description))}</div>
            <div class="card-foot">
              <div class="chips">
                <span class="chip category" style="color: var(--cat-${node.category}); border-color: var(--cat-${node.category})">${escape(node.category)}</span>
                ${node.meta && node.meta.model ? `<span class="chip model ${mc}">${escape(node.meta.model)}</span>` : ""}
                ${skills.slice(0, 4).map((s) => `<span class="chip skill">${escape(s)}</span>`).join("")}
              </div>
            </div>
          `;
          card.addEventListener("click", () => openDrawer(node));
          wrap.appendChild(card);
        });
      }

      function openDrawer(node) {
        $("drawer-title").textContent = node.label;
        const skills = (node.meta && node.meta.skills) || [];
        const subagents = (node.meta && node.meta.subagents) || [];
        const handoffs = (node.meta && node.meta.handoffTargets) || [];
        const outgoing = edgesBySource.get(node.id) || [];
        const incoming = edgesByTarget.get(node.id) || [];
        const sourceUrl = node.links && node.links.source;

        $("drawer-body").innerHTML = `
          <p class="desc">${escape(node.description || "")}</p>

          <h5>Category</h5>
          <div class="chips">
            <span class="chip category" style="color: var(--cat-${node.category}); border-color: var(--cat-${node.category})">${escape(node.category)}</span>
            ${node.meta && node.meta.model ? `<span class="chip model ${modelClass(node.meta.model)}">${escape(node.meta.model)}</span>` : ""}
          </div>

          ${node.path ? `<h5>Source path</h5><div class="chips"><span class="chip">${escape(node.path)}</span></div>` : ""}

          ${skills.length ? `<h5>Skills (${skills.length})</h5><ul>${skills.map((s) => `<li>${escape(s)}</li>`).join("")}</ul>` : ""}

          ${subagents.length ? `<h5>Subagents called (${subagents.length})</h5><ul>${subagents.map((s) => `<li>${escape(s)}</li>`).join("")}</ul>` : ""}

          ${handoffs.length ? `<h5>Hand-off targets (${handoffs.length})</h5><ul>${handoffs.map((s) => `<li>${escape(s)}</li>`).join("")}</ul>` : ""}

          ${outgoing.length ? `<h5>Outgoing edges (${outgoing.length})</h5><ul>${outgoing.slice(0, 30).map((e) => `<li>${escape(e.kind)} → ${escape(e.target.split(":")[1] || e.target)}</li>`).join("")}</ul>` : ""}

          ${incoming.length ? `<h5>Incoming edges (${incoming.length})</h5><ul>${incoming.slice(0, 30).map((e) => `<li>${escape(e.source.split(":")[1] || e.source)} → ${escape(e.kind)}</li>`).join("")}</ul>` : ""}

          ${sourceUrl ? `<a class="source-link" href="${escape(sourceUrl)}" target="_blank" rel="noopener">Open source on GitHub ↗</a>` : ""}
        `;
        $("drawer").classList.add("open");
        $("drawer").setAttribute("aria-hidden", "false");
        $("drawer-backdrop").classList.add("open");
      }

      function closeDrawer() {
        $("drawer").classList.remove("open");
        $("drawer").setAttribute("aria-hidden", "true");
        $("drawer-backdrop").classList.remove("open");
      }

      function switchView(view) {
        currentView = view;
        $("view-timeline").classList.toggle("active", view === "timeline");
        $("view-grid").classList.toggle("active", view === "grid");
        $("btn-timeline").classList.toggle("active", view === "timeline");
        $("btn-grid").classList.toggle("active", view === "grid");
        $("btn-timeline").setAttribute("aria-selected", view === "timeline");
        $("btn-grid").setAttribute("aria-selected", view === "grid");
      }

      // ---- Bootstrap ----
      async function init() {
        try {
          const res = await fetch(GRAPH_URL, { cache: "no-store" });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          graph = await res.json();
          nodes = graph.nodes || [];

          // Index edges for fast lookup in the drawer
          (graph.edges || []).forEach((e) => {
            if (!edgesBySource.has(e.source)) edgesBySource.set(e.source, []);
            edgesBySource.get(e.source).push(e);
            if (!edgesByTarget.has(e.target)) edgesByTarget.set(e.target, []);
            edgesByTarget.get(e.target).push(e);
          });

          $("topbar-meta").textContent = `${nodes.length} nodes · ${(graph.edges || []).length} edges · generated ${graph.generatedAt ? graph.generatedAt.slice(0, 10) : "?"}`;

          renderTimeline();
          renderFilters();
          renderGrid();
        } catch (err) {
          document.querySelector("main").innerHTML = `<div class="empty">Failed to load graph: ${escape(err.message)}</div>`;
          console.error(err);
        }
      }

      // ---- Events ----
      document.querySelectorAll(".view-toggle button").forEach((btn) => {
        btn.addEventListener("click", () => switchView(btn.dataset.view));
      });
      $("search-box").addEventListener("input", (e) => {
        searchQuery = e.target.value;
        if (currentView !== "grid") switchView("grid");
        renderGrid();
      });
      $("drawer-close").addEventListener("click", closeDrawer);
      $("drawer-backdrop").addEventListener("click", closeDrawer);
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeDrawer();
        if (e.key === "/" && document.activeElement.tagName !== "INPUT") {
          e.preventDefault();
          $("search-box").focus();
        }
      });

      init();
    </script>
  </body>
</html>
