# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: contoso-service-hub-run-3
metadata:
  template: azure-agentic-infraops/contoso-service-hub-run-3

infra:
  provider: bicep
  path: ./
  module: main

hooks:
  preprovision:
    shell: sh
    run: |
      echo "Contoso Service Hub Run 3 pre-provision checks"

      # Validate Azure CLI token (az account show is not sufficient)
      if ! az account get-access-token --resource https://management.azure.com/ --output none 2>/dev/null; then
        echo "ERROR: Azure CLI ARM token invalid. Run: az login --use-device-code"
        exit 1
      fi

      # Validate azd auth context (separate MSAL cache — does NOT inherit az login)
      if ! azd auth login --check-status >/dev/null 2>&1; then
        echo "ERROR: azd is not authenticated. Run: azd auth login --use-device-code"
        exit 1
      fi

      az bicep version >/dev/null 2>&1 || az bicep install >/dev/null
      az bicep build --file main.bicep >/dev/null
      az bicep lint --file main.bicep >/dev/null

  postprovision:
    shell: sh
    run: |
      echo "Verifying deployed resources in ${AZURE_RESOURCE_GROUP}"
      az resource list --resource-group "${AZURE_RESOURCE_GROUP}" --output table || true
