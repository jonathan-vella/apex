# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: e2e-ralph-loop
metadata:
  template: azure-agentic-infraops/bicep-e2e-ralph-loop

infra:
  provider: bicep
  path: ./
  module: main

hooks:
  preprovision:
    shell: sh
    run: |
      echo "[CHECK] Validating ARM token..."
      if ! az account get-access-token --resource https://management.azure.com/ --output none 2>/dev/null; then
        echo "[ERROR] ARM token invalid. Run: az login --use-device-code"
        exit 1
      fi
      echo "[OK] ARM token valid"
  postprovision:
    shell: sh
    run: |
      echo "[POST] Listing deployed resources..."
      az resource list --resource-group "${AZURE_RESOURCE_GROUP}" --output table 2>/dev/null || true
      echo "[OK] Post-provision verification complete"
