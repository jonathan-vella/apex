# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: contoso-service-hub-run-1
metadata:
  template: contoso-service-hub-run-1@0.0.1
  description: >
    Contoso Service Hub — full-stack digital platform for EU real estate and
    lifestyle services. Deploys 17 Azure resource types across 4 phases via
    Azure Verified Modules (100% AVM coverage). Region: swedencentral (EU).

infra:
  provider: bicep
  path: .
  module: main

hooks:
  preprovision:
    shell: sh
    run: |
      echo "=== Contoso Service Hub — Pre-provision ==="
      echo "Verifying required tools..."
      command -v az  >/dev/null 2>&1 && echo "  [ok] az" || { echo "  [FAIL] az CLI not found"; exit 1; }
      command -v jq  >/dev/null 2>&1 && echo "  [ok] jq" || echo "  [warn] jq not found — output parsing may be limited"
      echo "Tool check complete."
    interactive: false
    continueOnError: false

  postprovision:
    shell: sh
    run: |
      echo "=== Contoso Service Hub — Post-provision ==="
      echo "Deployment complete."
      echo ""
      echo "Next steps:"
      echo "  - Phase >= 4: run 'az aks get-credentials --resource-group <rg> --name <cluster>' to configure kubectl"
      echo "  - Configure DNS delegation using the nameServers output from this deployment"
      echo "  - Retrieve Key Vault URI from the keyVaultUri output and update application config"
    interactive: false
    continueOnError: true
