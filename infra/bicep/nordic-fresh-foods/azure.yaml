# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
# Azure Developer CLI (azd) project manifest — nordic-fresh-foods
# Replaces deploy.ps1 phased deployment with azd provision/deploy workflow.
# See: https://learn.microsoft.com/azure/developer/azure-developer-cli/

name: nordic-fresh-foods
metadata:
  template: azd-init@1.11.0

infra:
  provider: bicep
  path: ./
  module: main

hooks:
  preprovision:
    shell: sh
    run: |
      echo "╔══════════════════════════════════════════════════╗"
      echo "║   Nordic Fresh Foods — azd Provision             ║"
      echo "║   Environment: ${AZURE_ENV_NAME}                 ║"
      echo "║   Region: ${AZURE_LOCATION}                      ║"
      echo "╚══════════════════════════════════════════════════╝"

      # Validate ARM token (MSAL cache can be stale in devcontainers)
      echo "[CHECK] Validating ARM token..."
      if ! az account get-access-token --resource https://management.azure.com/ --output none 2>/dev/null; then
        echo "[ERROR] ARM token invalid. Run: az login --use-device-code"
        exit 1
      fi
      echo "[OK] ARM token valid"

  postprovision:
    shell: sh
    run: |
      echo "[POST] Verifying deployed resources..."
      az resource list --resource-group "${AZURE_RESOURCE_GROUP}" --output table 2>/dev/null || true
      echo "[OK] Post-provision verification complete"
