<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>APEX — Architecture Explorer</title>
    <script src="https://unpkg.com/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
    <script src="https://unpkg.com/dagre@0.8.5/dist/dagre.min.js"></script>
    <script src="https://unpkg.com/cytoscape-dagre@2.5.0/cytoscape-dagre.js"></script>
    <script src="https://unpkg.com/cytoscape-cose-bilkent@3.0.1/cytoscape-cose-bilkent.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        overflow: hidden;
      }
      #app {
        display: flex;
        height: 100vh;
      }
      #sidebar {
        width: 300px;
        background: #1e293b;
        border-right: 1px solid #334155;
        display: flex;
        flex-direction: column;
        z-index: 10;
      }
      #sidebar h1 {
        font-size: 14px;
        padding: 16px;
        border-bottom: 1px solid #334155;
        color: #94a3b8;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      #filters {
        padding: 12px;
        border-bottom: 1px solid #334155;
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .filter-btn {
        padding: 4px 10px;
        border-radius: 12px;
        border: 1px solid #475569;
        background: transparent;
        color: #94a3b8;
        font-size: 11px;
        cursor: pointer;
        transition: all 0.2s;
      }
      .filter-btn.active {
        border-color: var(--cat-color);
        color: #fff;
        background: var(--cat-color);
      }
      .filter-btn:hover {
        border-color: #64748b;
        color: #cbd5e1;
      }
      #details {
        flex: 1;
        overflow-y: auto;
        padding: 12px;
      }
      #details::-webkit-scrollbar {
        width: 6px;
      }
      #details::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 3px;
      }
      .detail-card {
        background: #0f172a;
        border: 1px solid #334155;
        border-radius: 8px;
        padding: 14px;
        margin-bottom: 10px;
      }
      .detail-card h3 {
        font-size: 13px;
        color: #f1f5f9;
        margin-bottom: 6px;
      }
      .detail-card p {
        font-size: 11px;
        color: #94a3b8;
        line-height: 1.5;
      }
      .conn-list {
        list-style: none;
        padding: 0;
        margin-top: 6px;
      }
      .conn-list li {
        font-size: 11px;
        color: #94a3b8;
        padding: 2px 0;
        cursor: pointer;
      }
      .conn-list li:hover {
        color: #60a5fa;
      }
      .conn-list li::before {
        content: "\2192 ";
        color: #475569;
      }
      #graph-area {
        flex: 1;
        position: relative;
      }
      #cy {
        width: 100%;
        height: 100%;
      }
      #legend {
        position: absolute;
        bottom: 16px;
        left: 16px;
        background: #1e293bdd;
        border: 1px solid #334155;
        border-radius: 8px;
        padding: 12px;
        z-index: 5;
        backdrop-filter: blur(8px);
      }
      #legend h4 {
        font-size: 11px;
        color: #64748b;
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .legend-item {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        color: #94a3b8;
        margin-bottom: 4px;
      }
      .legend-shape {
        width: 14px;
        height: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        line-height: 1;
      }
      #search {
        width: 100%;
        padding: 8px 12px;
        background: #0f172a;
        border: 1px solid #334155;
        border-radius: 6px;
        color: #e2e8f0;
        font-size: 12px;
        margin-bottom: 8px;
        outline: none;
      }
      #search:focus {
        border-color: #3b82f6;
      }
      #stats {
        padding: 8px 12px;
        font-size: 11px;
        color: #64748b;
        border-bottom: 1px solid #334155;
      }
      #tooltip {
        position: absolute;
        background: #1e293bf0;
        border: 1px solid #475569;
        border-radius: 6px;
        padding: 10px 14px;
        font-size: 11px;
        pointer-events: none;
        z-index: 20;
        max-width: 280px;
        display: none;
        backdrop-filter: blur(8px);
      }
      #tooltip h4 {
        color: #f1f5f9;
        margin-bottom: 4px;
        font-size: 12px;
      }
      #tooltip p {
        color: #94a3b8;
        line-height: 1.4;
      }
      .view-toggle {
        display: flex;
        gap: 4px;
        padding: 8px 12px;
        border-bottom: 1px solid #334155;
      }
      .view-btn {
        flex: 1;
        padding: 6px;
        border-radius: 4px;
        border: 1px solid #334155;
        background: transparent;
        color: #94a3b8;
        font-size: 11px;
        cursor: pointer;
        text-align: center;
        transition: all 0.2s;
      }
      .view-btn.active {
        background: #3b82f6;
        border-color: #3b82f6;
        color: #fff;
      }
      #layout-hint {
        padding: 4px 12px 4px;
        font-size: 10px;
        color: #475569;
        text-align: center;
        border-bottom: 1px solid #334155;
      }
      @media (max-width: 768px) {
        #sidebar {
          width: 220px;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="sidebar">
        <h1>APEX Explorer</h1>
        <div class="view-toggle">
          <button class="view-btn" data-view="all">All</button>
          <button class="view-btn active" data-view="workflow">Workflow</button>
          <button class="view-btn" data-view="skills">Skills</button>
          <button class="view-btn" data-view="ci">CI/Lint</button>
        </div>
        <div id="layout-hint">dagre (hierarchical top-down)</div>
        <div id="stats"></div>
        <div id="filters"></div>
        <div id="details">
          <input
            type="text"
            id="search"
            placeholder="Search nodes… (/ to focus)"
          />
          <div id="detail-content">
            <div class="detail-card">
              <h3>Click a node to explore</h3>
              <p>
                Hover for quick info. Click to see connections and details. Use
                view toggles to switch layouts. Scroll to zoom, drag to pan.
              </p>
            </div>
          </div>
        </div>
      </div>
      <div id="graph-area">
        <div id="cy"></div>
        <div id="tooltip"></div>
        <div id="legend">
          <h4>Component Types</h4>
        </div>
      </div>
    </div>

    <script>
      // ─── DATA MODEL ──────────────────────────────────────────────────────
      const CATEGORIES = {
        agent: {
          color: "#3b82f6",
          label: "Agent",
          shape: "round-rectangle",
          shapeLabel: "▬",
          w: 44,
          h: 30,
        },
        subagent: {
          color: "#6366f1",
          label: "Subagent",
          shape: "ellipse",
          shapeLabel: "●",
          w: 24,
          h: 24,
        },
        skill: {
          color: "#10b981",
          label: "Skill",
          shape: "hexagon",
          shapeLabel: "⬡",
          w: 26,
          h: 26,
        },
        instruction: {
          color: "#f59e0b",
          label: "Instruction",
          shape: "tag",
          shapeLabel: "▸",
          w: 24,
          h: 20,
        },
        prompt: {
          color: "#ec4899",
          label: "Prompt",
          shape: "star",
          shapeLabel: "★",
          w: 22,
          h: 22,
        },
        validator: {
          color: "#8b5cf6",
          label: "Validator",
          shape: "octagon",
          shapeLabel: "⬢",
          w: 22,
          h: 22,
        },
        workflow: {
          color: "#ef4444",
          label: "CI Workflow",
          shape: "rectangle",
          shapeLabel: "■",
          w: 28,
          h: 22,
        },
        gate: {
          color: "#f97316",
          label: "Gate",
          shape: "diamond",
          shapeLabel: "◆",
          w: 34,
          h: 34,
        },
        mcp: {
          color: "#06b6d4",
          label: "MCP Server",
          shape: "pentagon",
          shapeLabel: "⬠",
          w: 30,
          h: 30,
        },
      };

      const LINK_TYPES = {
        "uses-skill": { color: "#10b981", label: "uses skill" },
        handoff: { color: "#3b82f6", label: "handoff" },
        delegates: { color: "#6366f1", label: "delegates to" },
        triggers: { color: "#ec4899", label: "triggers" },
        validates: { color: "#8b5cf6", label: "validates" },
        enforces: { color: "#f59e0b", label: "enforces on" },
        runs: { color: "#ef4444", label: "runs" },
        connects: { color: "#06b6d4", label: "connects to" },
        "workflow-edge": { color: "#f97316", label: "workflow flow" },
      };

      // ─── BUILD GRAPH DATA ────────────────────────────────────────────────
      const nodes = [];
      const links = [];
      const nodeMap = {};

      function addNode(id, label, category, meta = {}) {
        if (nodeMap[id]) return;
        const n = { id, label, category, ...meta };
        nodes.push(n);
        nodeMap[id] = n;
      }
      function addLink(source, target, type) {
        if (!nodeMap[source] || !nodeMap[target]) return;
        if (
          links.find(
            (l) =>
              l.source === source && l.target === target && l.type === type,
          )
        )
          return;
        links.push({ source, target, type });
      }

      // Agents
      const agents = {
        "01-Orchestrator": { model: "Claude Opus 4.6", step: null },
        "01-Orchestrator-FastPath": { model: "Claude Sonnet 4.6", step: null },
        "02-Requirements": { model: "Claude Opus 4.6", step: 1 },
        "03-Architect": { model: "Claude Opus 4.6", step: 2 },
        "04-Design": { model: "Claude Sonnet 4.6", step: 3 },
        "04g-Governance": { model: "GPT-5.4", step: 3.5 },
        "05-IaC Planner": { model: "Claude Opus 4.6", step: 4 },
        "06b-Bicep CodeGen": { model: "GPT-5.4", step: 5 },
        "06t-Terraform CodeGen": { model: "GPT-5.4", step: 5 },
        "07b-Bicep Deploy": { model: "GPT-5.4", step: 6 },
        "07t-Terraform Deploy": { model: "GPT-5.4", step: 6 },
        "08-As-Built": { model: "GPT-5.4", step: 7 },
        "09-Diagnose": { model: "Claude Opus 4.6", step: null },
        "10-Challenger": { model: "GPT-5.4", step: null },
        "11-Context Optimizer": { model: "Claude Opus 4.6", step: null },
      };
      for (const [name, meta] of Object.entries(agents)) {
        addNode(`agent:${name}`, name, "agent", {
          model: meta.model,
          step: meta.step,
        });
      }

      // Subagents
      const subagents = [
        "challenger-review",
        "challenger-review-codex",
        "challenger-review-batch",
        "cost-estimate",
        "governance-discovery",
        "bicep-lint",
        "bicep-review",
        "bicep-whatif",
        "terraform-lint",
        "terraform-review",
        "terraform-plan",
      ];
      subagents.forEach((s) => addNode(`subagent:${s}`, s, "subagent"));

      // Delegation links
      const delegations = {
        "01-Orchestrator": [
          "challenger-review",
          "challenger-review-codex",
          "challenger-review-batch",
          "cost-estimate",
          "governance-discovery",
        ],
        "05-IaC Planner": ["governance-discovery"],
        "06b-Bicep CodeGen": ["bicep-lint", "bicep-review"],
        "06t-Terraform CodeGen": ["terraform-lint", "terraform-review"],
        "07b-Bicep Deploy": ["bicep-whatif"],
        "07t-Terraform Deploy": ["terraform-plan"],
        "03-Architect": ["cost-estimate"],
        "10-Challenger": [
          "challenger-review",
          "challenger-review-codex",
          "challenger-review-batch",
        ],
      };
      for (const [agent, subs] of Object.entries(delegations)) {
        subs.forEach((s) =>
          addLink(`agent:${agent}`, `subagent:${s}`, "delegates"),
        );
      }

      // Skills
      const skills = [
        "appinsights-instrumentation",
        "azure-adr",
        "azure-ai",
        "azure-aigateway",
        "azure-artifacts",
        "azure-bicep-patterns",
        "azure-cloud-migrate",
        "azure-compliance",
        "azure-compute",
        "azure-cost-optimization",
        "azure-defaults",
        "azure-deploy",
        "azure-diagnostics",
        "excalidraw",
        "python-diagrams",
        "mermaid",
        "azure-diagrams",
        "azure-hosted-copilot-sdk",
        "azure-kusto",
        "azure-messaging",
        "azure-prepare",
        "azure-quotas",
        "azure-rbac",
        "azure-resource-lookup",
        "azure-resource-visualizer",
        "azure-storage",
        "azure-validate",
        "context-optimizer",
        "context-shredding",
        "copilot-customization",
        "count-registry",
        "docs-writer",
        "entra-app-registration",
        "git-commit",
        "github-operations",
        "golden-principles",
        "iac-common",
        "make-skill-template",
        "microsoft-foundry",
        "session-resume",
        "terraform-patterns",
        "workflow-engine",
      ];
      skills.forEach((s) => addNode(`skill:${s}`, s, "skill"));

      // Skill affinity links
      const affinity = {
        "01-Orchestrator": {
          primary: [
            "golden-principles",
            "session-resume",
            "azure-defaults",
            "azure-artifacts",
            "workflow-engine",
          ],
          secondary: [
            "context-shredding",
            "github-operations",
            "azure-prepare",
          ],
        },
        "01-Orchestrator-FastPath": {
          primary: [
            "golden-principles",
            "session-resume",
            "azure-defaults",
            "azure-artifacts",
          ],
          secondary: [
            "context-shredding",
            "github-operations",
            "azure-prepare",
          ],
        },
        "02-Requirements": {
          primary: ["azure-defaults", "azure-artifacts", "session-resume"],
          secondary: ["azure-prepare"],
        },
        "03-Architect": {
          primary: ["azure-defaults", "azure-artifacts", "session-resume"],
          secondary: [
            "context-shredding",
            "excalidraw",
            "python-diagrams",
            "azure-prepare",
            "azure-cost-optimization",
          ],
        },
        "04-Design": {
          primary: ["excalidraw", "python-diagrams", "azure-adr"],
          secondary: ["azure-artifacts", "session-resume"],
        },
        "04g-Governance": {
          primary: ["azure-defaults", "azure-artifacts", "session-resume"],
          secondary: [],
        },
        "05-IaC Planner": {
          primary: [
            "azure-defaults",
            "azure-artifacts",
            "azure-bicep-patterns",
            "terraform-patterns",
            "session-resume",
          ],
          secondary: ["context-shredding"],
        },
        "06b-Bicep CodeGen": {
          primary: [
            "azure-defaults",
            "azure-artifacts",
            "azure-bicep-patterns",
            "session-resume",
          ],
          secondary: ["context-shredding"],
        },
        "06t-Terraform CodeGen": {
          primary: [
            "azure-defaults",
            "azure-artifacts",
            "terraform-patterns",
            "session-resume",
          ],
          secondary: ["context-shredding"],
        },
        "07b-Bicep Deploy": {
          primary: [
            "azure-defaults",
            "azure-artifacts",
            "azure-validate",
            "iac-common",
          ],
          secondary: ["session-resume", "github-operations", "azure-deploy"],
        },
        "07t-Terraform Deploy": {
          primary: [
            "azure-defaults",
            "azure-artifacts",
            "azure-validate",
            "iac-common",
            "terraform-patterns",
          ],
          secondary: ["session-resume", "github-operations", "azure-deploy"],
        },
        "08-As-Built": {
          primary: [
            "azure-defaults",
            "azure-artifacts",
            "excalidraw",
            "python-diagrams",
            "session-resume",
          ],
          secondary: ["context-shredding", "azure-cost-optimization"],
        },
        "09-Diagnose": {
          primary: ["azure-diagnostics", "azure-defaults"],
          secondary: ["azure-cost-optimization"],
        },
        "10-Challenger": { primary: [], secondary: ["golden-principles"] },
        "11-Context Optimizer": {
          primary: ["context-optimizer"],
          secondary: [],
        },
      };
      for (const [agent, sk] of Object.entries(affinity)) {
        [...sk.primary, ...sk.secondary].forEach((s) =>
          addLink(`agent:${agent}`, `skill:${s}`, "uses-skill"),
        );
      }

      // Instructions
      const instructions = [
        "agent-definitions",
        "agent-research-first",
        "agent-skills",
        "azure-artifacts",
        "bicep-code-best-practices",
        "code-quality",
        "context-optimization",
        "decision-logging",
        "docs",
        "docs-trigger",
        "github-actions",
        "governance-discovery",
        "iac-cost-repeatability",
        "iac-policy-compliance",
        "instructions",
        "javascript",
        "json",
        "markdown",
        "model-prompt-alignment",
        "no-hardcoded-counts",
        "no-heredoc",
        "powershell",
        "prompt",
        "python",
        "shell",
        "terraform-code-best-practices",
      ];
      instructions.forEach((i) => addNode(`instr:${i}`, i, "instruction"));

      // Instruction enforcement links
      const instrTargets = {
        "agent-definitions": [
          "agent:01-Orchestrator",
          "agent:02-Requirements",
          "agent:03-Architect",
        ],
        "agent-skills": ["skill:azure-defaults", "skill:azure-artifacts"],
        "bicep-code-best-practices": [
          "agent:06b-Bicep CodeGen",
          "agent:05-IaC Planner",
        ],
        "terraform-code-best-practices": [
          "agent:06t-Terraform CodeGen",
          "agent:05-IaC Planner",
        ],
        markdown: ["skill:docs-writer", "skill:azure-artifacts"],
        "no-heredoc": ["agent:01-Orchestrator", "agent:06b-Bicep CodeGen"],
        "no-hardcoded-counts": ["skill:count-registry", "skill:docs-writer"],
        "model-prompt-alignment": ["agent:01-Orchestrator", "agent:03-Architect"],
        "decision-logging": ["agent:02-Requirements", "agent:03-Architect"],
        "iac-policy-compliance": [
          "agent:06b-Bicep CodeGen",
          "agent:06t-Terraform CodeGen",
        ],
      };
      for (const [instr, targets] of Object.entries(instrTargets)) {
        targets.forEach((t) => {
          if (nodeMap[t]) addLink(`instr:${instr}`, t, "enforces");
        });
      }

      // Prompts
      const prompts = [
        "01-orchestrator",
        "02-requirements",
        "03-architect",
        "04-design",
        "04g-governance",
        "05-iac-planner",
        "06b-bicep-codegen",
        "06t-terraform-codegen",
        "07b-bicep-deploy",
        "07t-terraform-deploy",
        "08-as-built",
        "challenger-review",
        "context-audit",
        "diagnose-resource",
        "doc-gardening",
        "git-commit-push",
        "resume-workflow",
      ];
      prompts.forEach((p) => addNode(`prompt:${p}`, p, "prompt"));

      // Prompt trigger links
      const promptAgent = {
        "01-orchestrator": "01-Orchestrator",
        "02-requirements": "02-Requirements",
        "03-architect": "03-Architect",
        "04-design": "04-Design",
        "04g-governance": "04g-Governance",
        "05-iac-planner": "05-IaC Planner",
        "06b-bicep-codegen": "06b-Bicep CodeGen",
        "06t-terraform-codegen": "06t-Terraform CodeGen",
        "07b-bicep-deploy": "07b-Bicep Deploy",
        "07t-terraform-deploy": "07t-Terraform Deploy",
        "08-as-built": "08-As-Built",
        "challenger-review": "10-Challenger",
        "diagnose-resource": "09-Diagnose",
        "resume-workflow": "01-Orchestrator",
        "context-audit": "11-Context Optimizer",
      };
      for (const [p, a] of Object.entries(promptAgent)) {
        addLink(`prompt:${p}`, `agent:${a}`, "triggers");
      }

      // Validators
      const validators = [
        "artifact-templates",
        "h2-sync",
        "version-sync",
        "deprecated-refs",
        "mcp-config",
        "agent-frontmatter",
        "skills-format",
        "instruction-checks",
        "governance-refs",
        "session-state",
        "session-lock",
        "workflow-graph",
        "agent-registry",
        "skill-affinity",
        "skill-checks",
        "stale-refs",
        "json",
        "glob-audit",
        "skill-references",
        "orphaned-content",
        "docs-freshness",
        "model-alignment",
        "agent-checks",
        "no-hardcoded-counts",
        "md",
        "python",
        "terraform-fmt",
        "terraform-validate",
      ];
      validators.forEach((v) => addNode(`validator:${v}`, v, "validator"));

      // CI Workflows
      const ciWorkflows = [
        "lint",
        "agent-validation",
        "policy-compliance-check",
        "docs-freshness",
        "docs",
        "link-check",
        "avm-version-check",
        "azure-deprecation-tracker",
      ];
      ciWorkflows.forEach((w) => addNode(`ci:${w}`, w, "workflow"));

      // CI Workflow runs validator links
      const wfValidators = {
        lint: [
          "md",
          "json",
          "artifact-templates",
          "h2-sync",
          "version-sync",
          "deprecated-refs",
          "mcp-config",
          "docs-freshness",
        ],
        "agent-validation": [
          "agent-frontmatter",
          "skills-format",
          "mcp-config",
          "h2-sync",
          "governance-refs",
          "instruction-checks",
        ],
        "policy-compliance-check": [
          "agent-frontmatter",
          "skills-format",
          "instruction-checks",
          "governance-refs",
          "session-state",
          "session-lock",
          "workflow-graph",
          "agent-registry",
          "skill-affinity",
          "skill-checks",
          "stale-refs",
          "json",
          "glob-audit",
          "skill-references",
          "orphaned-content",
          "docs-freshness",

          "agent-checks",
          "no-hardcoded-counts",
          "artifact-templates",
          "h2-sync",

          "deprecated-refs",
          "mcp-config",
        ],
      };
      for (const [wf, vals] of Object.entries(wfValidators)) {
        vals.forEach((v) => addLink(`ci:${wf}`, `validator:${v}`, "runs"));
      }

      // MCP Servers
      ["github", "azure-pricing", "terraform"].forEach((m) =>
        addNode(`mcp:${m}`, m, "mcp"),
      );
      addLink("mcp:github", "agent:01-Orchestrator", "connects");
      addLink("mcp:github", "agent:07b-Bicep Deploy", "connects");
      addLink("mcp:github", "agent:07t-Terraform Deploy", "connects");
      addLink("mcp:azure-pricing", "agent:03-Architect", "connects");
      addLink("mcp:azure-pricing", "subagent:cost-estimate", "connects");
      addLink("mcp:terraform", "agent:05-IaC Planner", "connects");
      addLink("mcp:terraform", "agent:06t-Terraform CodeGen", "connects");

      // Workflow gates
      const gateNames = {
        "gate-1": "Requirements Approval",
        "gate-2": "Architecture Approval",
        "gate-2.5": "Governance Approval",
        "gate-3": "Plan Approval",

        "gate-5": "Deploy Approval",
      };
      Object.entries(gateNames).forEach(([id, label]) =>
        addNode(`gate:${id}`, label, "gate"),

      // Workflow flow edges
      const workflowFlow = [
        ["agent:02-Requirements", "gate:gate-1"],
        ["gate:gate-1", "agent:03-Architect"],
        ["agent:03-Architect", "gate:gate-2"],
        ["gate:gate-2", "agent:04-Design"],
        ["gate:gate-2", "agent:04g-Governance"],
        ["agent:04g-Governance", "gate:gate-2.5"],
        ["gate:gate-2.5", "agent:05-IaC Planner"],
        ["agent:05-IaC Planner", "gate:gate-3"],
        ["gate:gate-3", "agent:06b-Bicep CodeGen"],
        ["gate:gate-3", "agent:06t-Terraform CodeGen"],
        ["agent:06b-Bicep CodeGen", "gate:gate-4"],
        ["agent:06t-Terraform CodeGen", "gate:gate-4"],
        ["gate:gate-4", "agent:07b-Bicep Deploy"],
        ["gate:gate-4", "agent:07t-Terraform Deploy"],
        ["agent:07b-Bicep Deploy", "gate:gate-5"],
        ["agent:07t-Terraform Deploy", "gate:gate-5"],
        ["gate:gate-5", "agent:08-As-Built"],
      ];
      workflowFlow.forEach(([s, t]) => addLink(s, t, "workflow-edge"));

      // Orchestrator handoffs
      [
        "02-Requirements",
        "03-Architect",
        "04-Design",
        "04g-Governance",
        "05-IaC Planner",
        "06b-Bicep CodeGen",
        "07b-Bicep Deploy",
        "06t-Terraform CodeGen",
        "07t-Terraform Deploy",
        "08-As-Built",
        "09-Diagnose",
      ].forEach((a) => addLink("agent:01-Orchestrator", `agent:${a}`, "handoff"));

      // ─── COMPUTE DEGREE FOR SIZING ───────────────────────────────────────
      const degreeMap = {};
      nodes.forEach((n) => {
        degreeMap[n.id] = 0;
      });
      links.forEach((l) => {
        degreeMap[l.source] = (degreeMap[l.source] || 0) + 1;
        degreeMap[l.target] = (degreeMap[l.target] || 0) + 1;
      });

      // ─── CONVERT TO CYTOSCAPE ELEMENTS ───────────────────────────────────
      const elements = [];

      nodes.forEach((n) => {
        elements.push({
          group: "nodes",
          data: {
            id: n.id,
            label: n.label,
            category: n.category,
            model: n.model || "",
            step: n.step != null ? String(n.step) : "",
            degree: degreeMap[n.id] || 0,
          },
          classes: n.category,
        });
      });

      links.forEach((l, i) => {
        elements.push({
          group: "edges",
          data: {
            id: `e${i}`,
            source: l.source,
            target: l.target,
            type: l.type,
          },
          classes: l.type,
        });
      });

      // ─── CYTOSCAPE STYLESHEET ──────────────────────────────────────────
      const cyStyle = [
        // Base node — size by degree, labels on large nodes only
        {
          selector: "node",
          style: {
            label: "",
            "text-valign": "bottom",
            "text-halign": "center",
            "text-margin-y": 8,
            "font-size": "mapData(degree, 0, 30, 7, 12)",
            "font-family": "Inter, system-ui, sans-serif",
            color: "#c8d6e5",
            "text-max-width": "120px",
            "text-wrap": "ellipsis",
            "text-overflow-wrap": "anywhere",
            "border-width": 2,
            "border-opacity": 0.6,
            "text-background-color": "#0f172a",
            "text-background-opacity": 0.75,
            "text-background-padding": "2px",
            "min-zoomed-font-size": 5,
            "overlay-opacity": 0,
            width: "mapData(degree, 0, 30, 16, 65)",
            height: "mapData(degree, 0, 30, 16, 65)",
          },
        },
        // Show labels on nodes with 5+ connections or when zoomed
        {
          selector: "node.show-label",
          style: { label: "data(label)" },
        },
        // Agent — always show label, colored glow
        {
          selector: "node.agent",
          style: {
            label: "data(label)",
            "background-color": CATEGORIES.agent.color,
            "border-color": "#60a5fa",
            shape: "ellipse",
            "font-size": "mapData(degree, 0, 30, 9, 14)",
            "font-weight": "bold",
            color: "#e2e8f0",
          },
        },
        // Subagent
        {
          selector: "node.subagent",
          style: {
            "background-color": CATEGORIES.subagent.color,
            "border-color": "#818cf8",
            shape: "ellipse",
          },
        },
        // Skill
        {
          selector: "node.skill",
          style: {
            "background-color": CATEGORIES.skill.color,
            "border-color": "#34d399",
            shape: "ellipse",
          },
        },
        // Instruction
        {
          selector: "node.instruction",
          style: {
            "background-color": CATEGORIES.instruction.color,
            "border-color": "#fbbf24",
            shape: "ellipse",
          },
        },
        // Prompt
        {
          selector: "node.prompt",
          style: {
            "background-color": CATEGORIES.prompt.color,
            "border-color": "#f472b6",
            shape: "ellipse",
          },
        },
        // Validator
        {
          selector: "node.validator",
          style: {
            "background-color": CATEGORIES.validator.color,
            "border-color": "#a78bfa",
            shape: "ellipse",
          },
        },
        // CI Workflow
        {
          selector: "node.workflow",
          style: {
            "background-color": CATEGORIES.workflow.color,
            "border-color": "#f87171",
            shape: "ellipse",
          },
        },
        // Gate — diamond, always labeled
        {
          selector: "node.gate",
          style: {
            label: "data(label)",
            "background-color": CATEGORIES.gate.color,
            "border-color": "#fb923c",
            shape: "diamond",
            "font-size": 7,
          },
        },
        // MCP — pentagon, glow
        {
          selector: "node.mcp",
          style: {
            "background-color": CATEGORIES.mcp.color,
            "border-color": "#22d3ee",
            shape: "ellipse",
          },
        },
        // Focused center node (click-to-focus)
        {
          selector: "node.focus-center",
          style: {
            label: "data(label)",
            width: 80,
            height: 80,
            "font-size": 14,
            "font-weight": "bold",
            "border-width": 4,
            "z-index": 999,
          },
        },
        // Neighborhood nodes in focused view — show label, medium size
        {
          selector: "node.focus-neighbor",
          style: {
            label: "data(label)",
            width: 35,
            height: 35,
            "font-size": 9,
            "border-width": 2,
          },
        },
        // Base edge — very faint until interaction
        {
          selector: "edge",
          style: {
            "curve-style": "bezier",
            "target-arrow-shape": "triangle",
            "arrow-scale": 0.6,
            width: 0.75,
            opacity: 0.1,
            "line-color": "#475569",
            "target-arrow-color": "#475569",
          },
        },
        // Edge bundling for dense skill/instruction/validator edges
        {
          selector: "edge.uses-skill, edge.enforces, edge.runs",
          style: {
            "curve-style": "haystack",
            "haystack-radius": 0.5,
            "target-arrow-shape": "none",
          },
        },
        // Edge types
        {
          selector: "edge.uses-skill",
          style: { "line-color": "#10b981", "target-arrow-color": "#10b981" },
        },
        {
          selector: "edge.handoff",
          style: { "line-color": "#3b82f6", "target-arrow-color": "#3b82f6" },
        },
        {
          selector: "edge.delegates",
          style: { "line-color": "#6366f1", "target-arrow-color": "#6366f1" },
        },
        {
          selector: "edge.triggers",
          style: { "line-color": "#ec4899", "target-arrow-color": "#ec4899" },
        },
        {
          selector: "edge.validates",
          style: { "line-color": "#8b5cf6", "target-arrow-color": "#8b5cf6" },
        },
        {
          selector: "edge.enforces",
          style: { "line-color": "#f59e0b", "target-arrow-color": "#f59e0b" },
        },
        {
          selector: "edge.runs",
          style: { "line-color": "#ef4444", "target-arrow-color": "#ef4444" },
        },
        {
          selector: "edge.connects",

        },
        {
          selector: "edge.workflow-edge",
          style: {
            "curve-style": "bezier",
            "target-arrow-shape": "triangle",
            "line-color": "#f97316",
            "target-arrow-color": "#f97316",
            width: 2.5,
            opacity: 0.5,
          },
        },
        // Handoff + delegates edges keep bezier arrows
        {
          selector:
            "edge.handoff, edge.delegates, edge.triggers, edge.connects",
          style: {
            "curve-style": "bezier",
            "target-arrow-shape": "triangle",
          },
        },
        // State: dimmed
        { selector: ".dimmed", style: { opacity: 0.08 } },
        // State: highlighted edge
        { selector: "edge.highlighted", style: { opacity: 0.9, width: 3 } },
        // State: selected node
        {
          selector: "node.selected-node",
          style: { "border-width": 4, "border-color": "#ffffff" },
        },
        // State: search match
        {
          selector: "node.search-match",
          style: {
            "border-width": 3,
            "border-color": "#fbbf24",
            opacity: 1,
            "z-index": 10,
          },
        },
      ];

      // ─── VIEW FILTERS ────────────────────────────────────────────────────
      // Agents that participate in the linear workflow DAG
      const workflowAgentIds = new Set();
      workflowFlow.forEach(([s, t]) => {
        workflowAgentIds.add(s);
        workflowAgentIds.add(t);
      });
      // Include subagents connected to workflow agents
      const workflowSubagentIds = new Set();
      links.forEach((l) => {
        if (l.type === "delegates" && workflowAgentIds.has(l.source))
          workflowSubagentIds.add(l.target);
      });

      const viewFilters = {
        all: () => true,
        workflow: (n) => {
          const id = n.id();
          const cat = n.data("category");
          if (cat === "gate") return true;
          if (cat === "agent") return workflowAgentIds.has(id);
          if (cat === "subagent") return workflowSubagentIds.has(id);
          return false;
        },
        skills: (n) =>
          ["agent", "skill", "subagent"].includes(n.data("category")),
        ci: (n) =>
          ["validator", "workflow", "instruction"].includes(n.data("category")),
      };

      const viewLayouts = {
        all: {
          name: "cose-bilkent",
          animate: "end",
          animationDuration: 800,
          nodeRepulsion: 15000,
          idealEdgeLength: 120,
          edgeElasticity: 0.05,
          gravity: 0.25,
          gravityRange: 3.0,
          numIter: 2500,
          randomize: true,
          nodeDimensionsIncludeLabels: false,
          padding: 40,
          nestingFactor: 0.1,
          tile: true,
          tilingPaddingVertical: 15,
          tilingPaddingHorizontal: 15,
        },
        workflow: {
          name: "dagre",
          rankDir: "TB",
          nodeSep: 60,
          rankSep: 80,
          edgeSep: 15,
          animate: true,
          animationDuration: 500,
          fit: true,
          padding: 60,
          centerGraph: true,
        },
        skills: {
          name: "concentric",
          concentric: function (n) {
            if (n.hasClass("agent")) return 3;
            if (n.hasClass("subagent")) return 2;
            return 1;
          },
          levelWidth: function () {
            return 2;
          },
          animate: true,
          animationDuration: 500,
          fit: true,
          padding: 40,
          minNodeSpacing: 20,
        },
        ci: {
          name: "dagre",
          rankDir: "LR",
          nodeSep: 30,
          rankSep: 60,
          edgeSep: 8,
          animate: true,
          animationDuration: 500,
          fit: true,
          padding: 40,
        },
      };

      const layoutLabels = {
        all: "mind-map (force-directed)",
        workflow: "dagre (hierarchical top-down)",
        skills: "concentric (agents at center)",
        ci: "dagre (left-to-right)",
      };

      // Categories hidden by default in "All" view (reduces clutter)
      const defaultHiddenCategories = new Set([
        "prompt",
        "instruction",
        "validator",
      ]);

      // ─── INIT CYTOSCAPE ──────────────────────────────────────────────────
      let currentView = "workflow";

      const cy = cytoscape({
        container: document.getElementById("cy"),
        elements: elements,
        style: cyStyle,
        layout: { name: "preset" },
        minZoom: 0.1,
        maxZoom: 4,
        wheelSensitivity: 0.3,
      });

      function applyView(view) {
        currentView = view;
        const filter = viewFilters[view];

        cy.batch(() => {
          cy.elements().removeClass(
            "dimmed selected-node highlighted search-match",
          );
          cy.nodes().forEach((n) => {
            if (filter(n)) {
              n.show();
            } else {
              n.hide();
            }
          });
          cy.edges().forEach((e) => {
            if (e.source().visible() && e.target().visible()) {
              e.show();
            } else {
              e.hide();
            }
          });
        });

        // Pin Orchestrator at center for All view (mind-map hub)
        const orchestrator = cy.getElementById("agent:01-Orchestrator");
        const pinOrchestrator =
          view === "all" && orchestrator.length && orchestrator.visible();
        if (pinOrchestrator) {
          const w = cy.width(),
            h = cy.height();
          orchestrator.position({ x: w / 2, y: h / 2 });
          orchestrator.lock();
        }

        const layoutOpts = { ...viewLayouts[view], fit: true };
        const layout = cy.elements(":visible").layout(layoutOpts);
        layout.run();
        // Force fit after layout completes for proper centering
        layout.on("layoutstop", () => {
          if (pinOrchestrator) orchestrator.unlock();
          cy.fit(cy.elements(":visible"), 60);
        });
        document.getElementById("layout-hint").textContent = layoutLabels[view];

        // In workflow view, show all labels (fewer nodes)
        if (view === "workflow") {
          cy.nodes(":visible").addClass("show-label");
        }

        // Sync filter buttons
        const viewCategories = {
          all: Object.keys(CATEGORIES),
          workflow: ["agent", "gate", "subagent"],
          skills: ["agent", "skill", "subagent"],
          ci: ["validator", "workflow", "instruction"],
        }[view];
        document.querySelectorAll(".filter-btn").forEach((fb) => {
          fb.classList.toggle(
            "active",
            viewCategories.includes(fb.dataset.category),
          );
        });
      }

      // ─── TOOLTIP ─────────────────────────────────────────────────────────
      const tooltipEl = document.getElementById("tooltip");
      const cyContainer = document.getElementById("cy");

      cy.on("mouseover", "node", function (e) {
        const n = e.target;
        const cat = CATEGORIES[n.data("category")];
        const pos = n.renderedPosition();
        const rect = cyContainer.getBoundingClientRect();

        let html = `<h4 style="color:${cat.color}">${cat.label}: ${n.data("label")}</h4>`;
        if (n.data("model")) html += `<p>Model: ${n.data("model")}</p>`;
        if (n.data("step")) html += `<p>Step: ${n.data("step")}</p>`;
        const degree = n.connectedEdges(":visible").length;
        html += `<p>${degree} connections</p>`;

        tooltipEl.innerHTML = html;
        tooltipEl.style.display = "block";
        tooltipEl.style.left = rect.left + pos.x + 15 + "px";
        tooltipEl.style.top = rect.top + pos.y + 15 + "px";
      });

      cy.on("mouseout", "node", function () {
        tooltipEl.style.display = "none";
      });

      cy.on("pan zoom", function () {
        tooltipEl.style.display = "none";
      });

      // ─── NODE SELECTION — FOCUS VIEW (mind-map style) ───────────────────
      let selectedNodeId = null;
      let isFocusMode = false;

      function enterFocusMode(n) {
        selectedNodeId = n.id();
        isFocusMode = true;
        const neighborhood = n.neighborhood();
        const focusEles = neighborhood.add(n);

        cy.batch(() => {
          // Hide everything not in neighborhood
          cy.elements().removeClass(
            "dimmed highlighted selected-node focus-center focus-neighbor focus-edge show-label",
          );
          cy.elements().addClass("dimmed");
          focusEles.removeClass("dimmed");
          n.addClass("focus-center");
          neighborhood.nodes().addClass("focus-neighbor");
          n.connectedEdges()
            .filter((e) => {
              const other =
                e.source().id() === n.id() ? e.target() : e.source();
              return neighborhood.nodes().contains(other);
            })
            .removeClass("dimmed")
            .addClass("focus-edge");
        });

        // Run concentric layout on just the focused neighborhood
        focusEles
          .layout({
            name: "concentric",
            concentric: function (ele) {
              return ele.id() === n.id() ? 2 : 1;
            },
            levelWidth: function () {
              return 1;
            },
            animate: true,
            animationDuration: 400,
            fit: true,
            padding: 80,
            minNodeSpacing: 40,
          })
          .run();

        showDetailPanel(n);
      }

      function exitFocusMode() {
        if (!isFocusMode) return;
        isFocusMode = false;
        selectedNodeId = null;
        cy.batch(() => {
          cy.elements().removeClass(
            "dimmed highlighted selected-node focus-center focus-neighbor focus-edge",
          );
        });
        // Re-run the current view layout to restore positions
        applyView(currentView);
        resetDetailPanel();
      }

      cy.on("tap", "node", function (e) {
        const n = e.target;
        if (isFocusMode && n.id() === selectedNodeId) {
          // Clicking the same center node exits focus mode
          exitFocusMode();
          return;
        }
        enterFocusMode(n);
      });

      cy.on("tap", function (e) {
        if (e.target === cy) {
          if (isFocusMode) {
            exitFocusMode();
          } else {
            selectedNodeId = null;
            cy.batch(() => {
              cy.elements().removeClass("dimmed highlighted selected-node");
            });
            resetDetailPanel();
          }
        }
      });

      function showDetailPanel(n) {
        const cat = CATEGORIES[n.data("category")];
        const outgoing = n
          .connectedEdges(":visible")
          .filter((e) => e.source().id() === n.id());
        const incoming = n
          .connectedEdges(":visible")
          .filter((e) => e.target().id() === n.id());

        let html = `<div class="detail-card">
          <h3 style="color:${cat.color}">${cat.label}: ${n.data("label")}</h3>
          ${n.data("model") ? `<p>Model: <strong>${n.data("model")}</strong></p>` : ""}
          ${n.data("step") ? `<p>Workflow Step: <strong>${n.data("step")}</strong></p>` : ""}
          <p>${outgoing.length + incoming.length} connections</p>
        </div>`;

        if (outgoing.length) {
          html += `<div class="detail-card"><h3>Outgoing (${outgoing.length})</h3><ul class="conn-list">`;
          outgoing.forEach((e) => {
            const t = e.target();
            const lt = LINK_TYPES[e.data("type")];
            html += `<li data-id="${t.id()}" style="color:${lt ? lt.color : "#94a3b8"}">${lt ? lt.label : e.data("type")}: ${t.data("label")}</li>`;
          });
          html += "</ul></div>";
        }
        if (incoming.length) {
          html += `<div class="detail-card"><h3>Incoming (${incoming.length})</h3><ul class="conn-list">`;
          incoming.forEach((e) => {
            const s = e.source();
            const lt = LINK_TYPES[e.data("type")];
            html += `<li data-id="${s.id()}" style="color:${lt ? lt.color : "#94a3b8"}">${lt ? lt.label : e.data("type")}: ${s.data("label")}</li>`;
          });
          html += "</ul></div>";
        }

        document.getElementById("detail-content").innerHTML = html;

        document.querySelectorAll(".conn-list li").forEach((li) => {
          li.addEventListener("click", () => {
            const target = cy.getElementById(li.dataset.id);
            if (target.length) {
              cy.animate({ center: { eles: target }, duration: 300 });
              target.emit("tap");
            }
          });
        });
      }

      function resetDetailPanel() {
        document.getElementById("detail-content").innerHTML =
          `<div class="detail-card">
          <h3>Click a node to explore</h3>
          <p>Hover for quick info. Click to see connections and details.
          Use view toggles to switch layouts. Scroll to zoom, drag to pan.</p>
        </div>`;
      }

      // ─── SIDEBAR CONTROLS ────────────────────────────────────────────────
      // Stats
      const catCounts = {};
      nodes.forEach((n) => {
        catCounts[n.category] = (catCounts[n.category] || 0) + 1;
      });
      document.getElementById("stats").textContent =
        `${nodes.length} nodes \u00b7 ${links.length} edges`;

      // Legend
      const legendEl = document.getElementById("legend");
      for (const [key, cat] of Object.entries(CATEGORIES)) {
        if (!catCounts[key]) continue;
        const div = document.createElement("div");
        div.className = "legend-item";
        div.innerHTML = `<div class="legend-shape" style="color:${cat.color}">${cat.shapeLabel}</div>${cat.label} (${catCounts[key]})`;
        legendEl.appendChild(div);
      }

      // Category filter buttons
      const filtersEl = document.getElementById("filters");
      for (const [key, cat] of Object.entries(CATEGORIES)) {
        if (!catCounts[key]) continue;
        const btn = document.createElement("button");
        btn.className = "filter-btn active";
        btn.style.setProperty("--cat-color", cat.color);
        btn.textContent = `${cat.label} (${catCounts[key]})`;
        btn.dataset.category = key;
        btn.addEventListener("click", () => {
          btn.classList.toggle("active");
          applyFilters();
        });
        filtersEl.appendChild(btn);
      }

      function applyFilters() {
        const active = new Set(
          [...document.querySelectorAll(".filter-btn.active")].map(
            (b) => b.dataset.category,
          ),
        );
        cy.batch(() => {
          cy.elements().removeClass(
            "dimmed selected-node highlighted search-match",
          );
          cy.nodes().forEach((n) => {
            if (active.has(n.data("category"))) {
              n.show();
            } else {
              n.hide();
            }
          });
          cy.edges().forEach((e) => {
            if (e.source().visible() && e.target().visible()) {
              e.show();
            } else {
              e.hide();
            }
          });
        });
        cy.elements(":visible")
          .layout({ ...viewLayouts[currentView], fit: true })
          .run();
      }

      // View toggles
      document.querySelectorAll(".view-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          document
            .querySelectorAll(".view-btn")
            .forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          applyView(btn.dataset.view);
        });
      });

      // Search
      const searchInput = document.getElementById("search");
      searchInput.addEventListener("input", () => {
        const q = searchInput.value.toLowerCase();
        cy.batch(() => {
          cy.elements().removeClass("dimmed search-match");
          if (!q) return;
          const matches = cy
            .nodes(":visible")
            .filter((n) => n.data("label").toLowerCase().includes(q));
          if (matches.length) {
            cy.elements(":visible").addClass("dimmed");
            matches.removeClass("dimmed").addClass("search-match");
            matches.connectedEdges(":visible").removeClass("dimmed");
            matches.neighborhood(":visible").nodes().removeClass("dimmed");
          }
        });
      });

      // Keyboard shortcut: / to focus search, Escape to clear
      document.addEventListener("keydown", (e) => {
        if (e.key === "/" && document.activeElement !== searchInput) {
          e.preventDefault();
          searchInput.focus();
        }
        if (e.key === "Escape") {
          searchInput.value = "";
          searchInput.dispatchEvent(new Event("input"));
          searchInput.blur();
          if (selectedNodeId) {
            selectedNodeId = null;
            cy.batch(() => {
              cy.elements().removeClass("dimmed highlighted selected-node");
            });
            resetDetailPanel();
          }
        }
      });

      // ─── ZOOM-BASED LABEL TOGGLE ────────────────────────────────────────
      function updateLabelsForZoom() {
        if (isFocusMode) return; // Don't toggle labels in focus mode
        const zoom = cy.zoom();
        cy.batch(() => {
          if (zoom > 0.7) {
            cy.nodes().addClass("show-label");
          } else {
            // Only show labels on high-degree nodes when zoomed out
            cy.nodes().removeClass("show-label");
            cy.nodes()
              .filter((n) => (n.data("degree") || 0) >= 8)
              .addClass("show-label");
          }
        });
      }
      cy.on("zoom", updateLabelsForZoom);

      // ─── INITIAL RENDER ──────────────────────────────────────────────────
      // Set default hidden categories for All view filter buttons
      document.querySelectorAll(".filter-btn").forEach((fb) => {
        if (defaultHiddenCategories.has(fb.dataset.category)) {
          fb.classList.remove("active");
        }
      });
      applyView("workflow");
      updateLabelsForZoom();
    </script>
  </body>
</html>
