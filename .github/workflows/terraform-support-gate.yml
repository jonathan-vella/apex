# Terraform Support Gate
# Satisfies the "Terraform Support Complete" required status check for all PRs.
# The original tf-dev-merge-gate used this check to gate Terraform track completion.
# That gate is retired; this workflow keeps the required check satisfied.

name: terraform-support-gate

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  terraform-support-complete:
    name: Terraform Support Complete
    runs-on: ubuntu-latest
    steps:
      - run: echo "Terraform support gate — always passes for non-data PRs"
