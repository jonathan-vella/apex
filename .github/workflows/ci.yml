# CI Workflow
# Single required status check for all PRs to main
# Consolidates: lint, agent-validation, policy-compliance-check
# Runs markdown linting + all Node.js validators + handoff validation

name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, feature/*]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install bats
        run: sudo apt-get install -y bats

      - name: Scan for secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint Markdown
        run: npm run lint:md

      - name: Run Node.js validators (CI-safe)
        run: npm run validate:_node-ci

      - name: Validate hooks
        run: npm run validate:hooks

      - name: Run hook tests
        run: npm run test:hooks

      - name: Validate handoff references
        run: |
          echo "Validating agent handoff references..."

          # Anchor on indented YAML frontmatter lines so prose like
          # "subagent: foo" or "agent name:" in body markdown doesn't slip
          # through. Real handoff entries always look like `    agent: NAME`
          # under a `handoffs:` list.
          grep -rhE "^[[:space:]]+agent:[[:space:]]" .github/agents/ --include="*.agent.md" 2>/dev/null | \
            sed 's/^[[:space:]]*agent:[[:space:]]*//' | \
            tr -d '"' | \
            sort -u > /tmp/handoffs.txt

          # `name:` lives at column 0 of the YAML frontmatter, so anchor
          # to start-of-line with no leading whitespace.
          grep -rhE "^name:[[:space:]]" .github/agents/ --include="*.agent.md" 2>/dev/null | \
            sed 's/^name:[[:space:]]*//' | \
            tr -d '"' | \
            sort -u > /tmp/agents.txt

          BUILTIN_AGENTS="agent"
          ERRORS=0
          while IFS= read -r handoff; do
            [ -z "$handoff" ] && continue
            if echo "$BUILTIN_AGENTS" | grep -qiw "$handoff"; then
              continue
            fi
            if ! grep -qi "^${handoff}$" /tmp/agents.txt; then
              echo "Invalid handoff reference: $handoff"
              ERRORS=$((ERRORS + 1))
            fi
          done < /tmp/handoffs.txt

          if [ $ERRORS -gt 0 ]; then
            echo "Found $ERRORS invalid handoff reference(s)"
            exit 1
          else
            echo "All handoff references are valid"
          fi

  external-tests:
    name: External Python tests (apex-recall + azure-pricing MCP)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python test dependencies
        run: |
          python -m pip install --upgrade pip
          # apex-recall ships its own deps via pyproject; install in editable mode
          # so its tests can import the package without sys.path hacks.
          python -m pip install -e tools/apex-recall
          # azure-pricing tests live under the server's tests/ directory and
          # import the server module via the same pattern. Install with [dev]
          # extras so pytest-asyncio (required by the async fixtures) is present.
          python -m pip install -e 'tools/mcp-servers/azure-pricing[dev]'
          python -m pip install pytest

      - name: Run apex-recall test suite
        run: npm run test:apex-recall

      - name: Run azure-pricing MCP test suite
        run: npm run test:azure-pricing-mcp
