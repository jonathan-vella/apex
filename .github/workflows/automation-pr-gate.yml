# Automation PR Gate
# Satisfies all 4 required status checks for PRs opened by automation workflows
# (e.g. automation/azure-deprecation-tracker) so auto-merge is not blocked.

name: automation-pr-gate

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/data/**"

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - run: echo "Data-only change — lint not required"

  validate-agents-skills:
    name: Validate Agents & Skills
    runs-on: ubuntu-latest
    steps:
      - run: echo "Data-only change — agent/skill validation not required"

  policy-compliance-check:
    name: policy-compliance-check
    runs-on: ubuntu-latest
    steps:
      - run: echo "Data-only change — policy compliance not required"

  terraform-support-complete:
    name: Terraform Support Complete
    runs-on: ubuntu-latest
    steps:
      - run: echo "Data-only change — Terraform gate not required"
