# Draw.io SVG Export Workflow
# Automatically exports .drawio files to .drawio.svg when they change.
# Uses draw.io Desktop on the x86 ubuntu-latest runner with xvfb for headless rendering.
# Commits generated SVGs back to the branch.

name: drawio-svg-export

on:
  push:
    paths:
      - "agent-output/**/*.drawio"
      - "site/public/**/*.drawio"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DRAWIO_VERSION: "26.2.2"

jobs:
  export-svg:
    name: Export Draw.io SVGs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Install draw.io Desktop and xvfb
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends xvfb
          DEB_FILE="drawio-amd64-${DRAWIO_VERSION}.deb"
          wget -q "https://github.com/jgraph/drawio-desktop/releases/download/v${DRAWIO_VERSION}/${DEB_FILE}" -O "/tmp/${DEB_FILE}"
          wget -q "https://github.com/jgraph/drawio-desktop/releases/download/v${DRAWIO_VERSION}/${DEB_FILE}.sha256" -O "/tmp/${DEB_FILE}.sha256"
          (cd /tmp && sha256sum -c "${DEB_FILE}.sha256")
          sudo apt-get install -y --no-install-recommends "/tmp/${DEB_FILE}"
          rm "/tmp/${DEB_FILE}" "/tmp/${DEB_FILE}.sha256"

      - name: Export all .drawio files to SVG
        run: |
          EXPORTED=0
          FAILED=0

          while IFS= read -r -d '' drawio_file; do
            svg_file="${drawio_file}.svg"
            echo "Exporting: ${drawio_file} → ${svg_file}"
            if xvfb-run -a drawio --export --format svg --embed-diagram --output "${svg_file}" "${drawio_file}" --no-sandbox 2>/dev/null; then
              EXPORTED=$((EXPORTED + 1))
            else
              echo "::warning::Failed to export ${drawio_file}"
              FAILED=$((FAILED + 1))
            fi
          done < <(find agent-output site/public -name '*.drawio' -print0 2>/dev/null)

          echo "✅ Exported: ${EXPORTED} | ⚠️ Failed: ${FAILED}"
          if [[ ${EXPORTED} -eq 0 && ${FAILED} -gt 0 ]]; then
            exit 1
          fi

      - name: Commit and push SVGs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add '*.drawio.svg'
          if git diff --cached --quiet; then
            echo "No SVG changes to commit"
          else
            git commit -m "ci: auto-export .drawio.svg files [skip ci]"
            git push
          fi
