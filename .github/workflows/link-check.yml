# Link Check Workflow
# Validates all hyperlinks in docs/ are reachable on PRs that touch docs paths.
# The standalone weekly cron was folded into weekly-maintenance.yml (May 2026)
# so external link rot is still caught between docs edits.

name: link-check

on:
  pull_request:
    branches: [main]
    paths:
      - "site/src/content/docs/**"
      - ".markdown-link-check.json"
      - ".markdown-link-check-site.json"
  push:
    branches: [main]
    paths:
      - "site/src/content/docs/**"
      - ".markdown-link-check.json"
      - ".markdown-link-check-site.json"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  link-check:
    name: Check docs links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node
        uses: ./.github/actions/setup-node-repo

      - name: Check links in docs/
        run: npm run lint:links:docs
