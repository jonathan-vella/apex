# Excalidraw SVG Export Workflow
# Automatically exports .excalidraw files to .excalidraw.svg when they change.
# Uses @excalidraw/utils for headless rendering.
# Commits generated SVGs back to the branch.

name: excalidraw-svg-export

on:
  push:
    paths:
      - "agent-output/**/*.excalidraw"
      - "assets/**/*.excalidraw"
      - "site/public/**/*.excalidraw"
      - ".github/skills/azure-diagrams/references/**/*.excalidraw"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  export-svg:
    name: Export Excalidraw SVGs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Node.js dependencies
        run: npm ci

      - name: Export all .excalidraw files to SVG
        run: node scripts/export-excalidraw-svg.mjs

      - name: Commit and push SVGs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for dir in agent-output assets site/public .github/skills/azure-diagrams/references; do
            if [ -d "$dir" ]; then
              git add "$dir"
            fi
          done
          if git diff --cached --quiet; then
            echo "No SVG changes to commit"
          else
            git commit -m "ci: auto-export .excalidraw.svg files [skip ci]"
            git push
          fi
